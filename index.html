<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gespreksdoos App</title>

<script src="https://webgazer.cs.brown.edu/webgazer.js"></script>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h2{
    margin-bottom:20px;
}

.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:20px;
}

.card{
    width:170px;
    min-height:170px;
    border-radius:16px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    color:white;
    font-weight:bold;
    padding:10px;
    transition:0.3s;
    position:relative;
    text-align:center;
    user-select:none;
}

.answer{
    background:white;
    color:black;
}

.card.active-gaze,
.answer.active-gaze{
    transform:scale(1.08);
    border:6px solid yellow;
    box-shadow:0 0 30px yellow;
}

.timer{
    width:75%;
    height:10px;
    background:rgba(255,255,255,0.3);
    border-radius:10px;
    margin-top:12px;
    overflow:hidden;
}

.answer .timer{
    background:#ddd;
}

.timer-fill{
    width:0%;
    height:100%;
    background:yellow;
    transition:width 0.1s linear;
}

.answers{
    display:none;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

.back{
    margin-top:20px;
    font-size:22px;
    cursor:pointer;
    font-weight:bold;
}

.eyeButton{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#333;
    color:white;
    margin-bottom:20px;
}

.calibration-dot{
    width:35px;
    height:35px;
    border-radius:50%;
    background:red;
    position:fixed;
    z-index:9999;
    cursor:pointer;
}

</style>

</head>

<body>

<h2 id="title">Kies een vraag</h2>

<button class="eyeButton" onclick="startCalibration()">
👁️ Oogbesturing starten
</button>

<div id="questions" class="grid"></div>

<div id="answers" class="answers"></div>

<div class="back" onclick="goBack()">⬅ Terug</div>

<script>

function speak(text){

    speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);

    utterance.lang = "nl-BE";

    utterance.rate = 0.9;

    speechSynthesis.speak(utterance);
}

const data = [

{
q:"Wanneer ben jij blij?",
color:"#4A90E2",
icon:"😊",
answers:[
{t:"vrienden",i:"👫"},
{t:"familie",i:"👨‍👩‍👧"},
{t:"muziek",i:"🎵"},
{t:"eten",i:"🍽️"}
]
},

{
q:"Wat eet jij graag?",
color:"#E94E4E",
icon:"🍕",
answers:[
{t:"pizza",i:"🍕"},
{t:"friet",i:"🍟"},
{t:"kip",i:"🍗"},
{t:"ijs",i:"🍦"}
]
},

{
q:"Wat doe jij graag buiten?",
color:"#4CAF50",
icon:"🌳",
answers:[
{t:"voetballen",i:"⚽"},
{t:"basketballen",i:"🏀"},
{t:"tuin werken",i:"🌱"},
{t:"dieren verzorgen",i:"🐄"}
]
},

{
q:"Wat doe jij graag met vrienden?",
color:"#FF9800",
icon:"👫",
answers:[
{t:"buiten spelen",i:"🌳"},
{t:"go-carten",i:"🏎️"},
{t:"uitgaan",i:"🎉"},
{t:"niets",i:"😐"}
]
}

];

const qDiv = document.getElementById("questions");
const aDiv = document.getElementById("answers");
const title = document.getElementById("title");

function loadQuestions(){

    qDiv.innerHTML = "";

    data.forEach((item,index)=>{

        const div = document.createElement("div");

        div.className = "card";

        div.style.background = item.color;

        div.innerHTML = `
            <div style="font-size:42px">${item.icon}</div>
            <div>${item.q}</div>

            <div class="timer">
                <div class="timer-fill"></div>
            </div>
        `;

        div.onclick = ()=>{

            speak(item.q);

            showAnswers(index);
        };

        qDiv.appendChild(div);

    });

}

function showAnswers(index){

    qDiv.style.display = "none";

    aDiv.style.display = "flex";

    const item = data[index];

    title.innerText = item.q;

    aDiv.innerHTML = "";

    item.answers.forEach(ans=>{

        const div = document.createElement("div");

        div.className = "card answer";

        div.innerHTML = `
            <div style="font-size:38px">${ans.i}</div>
            <div>${ans.t}</div>

            <div class="timer">
                <div class="timer-fill"></div>
            </div>
        `;

        div.onclick = ()=>{

            speak(ans.t);
        };

        aDiv.appendChild(div);

    });

}

function goBack(){

    speak("terug");

    qDiv.style.display = "flex";

    aDiv.style.display = "none";

    title.innerText = "Kies een vraag";
}

loadQuestions();

let currentElement = null;
let dwellTimeout = null;
let progressInterval = null;

function clearGaze(){

    clearTimeout(dwellTimeout);

    clearInterval(progressInterval);

    document.querySelectorAll(".card").forEach(el=>{

        el.classList.remove("active-gaze");

        const fill = el.querySelector(".timer-fill");

        if(fill){
            fill.style.width = "0%";
        }

    });

}

function startCalibration(){

    alert("Klik op de rode bolletjes terwijl je ernaar kijkt 👁️");

    const points = [

        {x:"10%", y:"10%"},
        {x:"50%", y:"10%"},
        {x:"90%", y:"10%"},

        {x:"10%", y:"50%"},
        {x:"50%", y:"50%"},
        {x:"90%", y:"50%"},

        {x:"10%", y:"90%"},
        {x:"50%", y:"90%"},
        {x:"90%", y:"90%"}

    ];

    let completed = 0;

    points.forEach(point=>{

        const dot = document.createElement("div");

        dot.className = "calibration-dot";

        dot.style.left = point.x;

        dot.style.top = point.y;

        document.body.appendChild(dot);

        dot.onclick = (event)=>{

            webgazer.recordScreenPosition(
                event.clientX,
                event.clientY,
                "click"
            );

            dot.remove();

            completed++;

            if(completed === points.length){

                startEyeTracking();

            }

        };

    });

}

function startEyeTracking(){

    webgazer.setTracker("clmtrackr");

    webgazer.begin();

    webgazer.showPredictionPoints(true);

    alert("Oogbesturing actief 👁️");

    webgazer.setGazeListener((data)=>{

        if(!data) return;

        const x = data.x;
        const y = data.y;

        const rawElement = document.elementFromPoint(x,y);

        const element = rawElement?.closest(".card");

        if(!element){

            clearGaze();

            currentElement = null;

            return;
        }

        if(currentElement !== element){

            clearGaze();

            currentElement = element;

            element.classList.add("active-gaze");

            const fill = element.querySelector(".timer-fill");

            let progress = 0;

            progressInterval = setInterval(()=>{

                progress += 5;

                if(fill){
                    fill.style.width = progress + "%";
                }

            },100);

            dwellTimeout = setTimeout(()=>{

                element.click();

            },2000);

        }

    });

}

</script>

</body>
</html>
